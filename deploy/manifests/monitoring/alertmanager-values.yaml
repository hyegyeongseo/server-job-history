# kps Alertmanager 에 Slack receiver.
# helm upgrade kps prometheus-community/kube-prometheus-stack -n monitoring --reuse-values -f <이 파일>
#
# 🔐 webhook URL 은 git 에 안 넣는다. 클러스터 Secret 으로 두고 api_url_file 로 읽는다:
#   kubectl -n monitoring create secret generic alertmanager-slack-webhook \
#     --from-literal=url='https://hooks.slack.com/services/T.../B.../xxxx'
#   → kps-values.yaml 의 alertmanager.alertmanagerSpec.secrets 로 마운트되어
#     /etc/alertmanager/secrets/alertmanager-slack-webhook/url 경로에 나타난다.
#   이 파일엔 "경로"만 있으므로 그대로 커밋/푸시해도 안전.
#
# ⚠️ Incoming Webhook 1개 = 채널 1개(발급 시 고정). slack_configs 의 channel: 값은 무시된다.
#    채널을 둘로 나누려면 webhook 도 2개 필요. lab 은 단일 채널(#alerts)로 통일.
#    page/default 는 title 접두사(🚨 PAGE)로만 구분한다.
alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-slack-webhook      # → /etc/alertmanager/secrets/alertmanager-slack-webhook/url
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "slack-default"
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # severity=none = kps 메타 알림(Watchdog=heartbeat, InfoInhibitor=억제 헬퍼).
        # 사람이 볼 게 아니라 Slack 으로 안 보낸다. alertname 개별이 아니라 severity 로 일괄 차단.
        - receiver: "null"
          matchers:
            - severity = "none"
        - receiver: "slack-page"
          matchers:
            - severity = "page"
    receivers:
      - name: "null"          # 버리는 리시버(Watchdog 등 무음 처리)
      - name: "slack-default"
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            channel: "#alerts"   # 표시용(webhook 바인딩 채널이 실제 목적지)
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: >-
              {{ range .Alerts }}*{{ .Labels.alertname }}* ({{ .Labels.severity }})
              {{ .Annotations.summary }}
              {{ if .Annotations.runbook }}runbook: {{ .Annotations.runbook }}{{ end }}
              {{ end }}
      - name: "slack-page"
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            channel: "#alerts"   # 표시용(같은 webhook → 같은 채널, 접두사로만 구분)
            send_resolved: true
            title: '🚨 PAGE: {{ .CommonAnnotations.summary }}'
            text: >-
              {{ range .Alerts }}*{{ .Labels.alertname }}*
              {{ .Annotations.summary }}
              {{ if .Annotations.runbook }}runbook: {{ .Annotations.runbook }}{{ end }}
              {{ end }}
