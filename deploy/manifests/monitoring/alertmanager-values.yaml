# kps Alertmanager 에 Slack receiver.
# helm upgrade kps prometheus-community/kube-prometheus-stack -n monitoring --reuse-values -f <이 파일>
# 실제 Slack webhook URL 은 비밀 — 이 파일에 진짜 값을 넣어 커밋하지 말 것(로컬에서만 채우기).
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "slack-default"
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "slack-page"
          matchers:
            - severity = "page"
    receivers:
      - name: "slack-default"
        slack_configs:
          - api_url: "<SLACK_WEBHOOK_URL>"
            channel: "#alerts"
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: >-
              {{ range .Alerts }}*{{ .Labels.alertname }}* ({{ .Labels.severity }})
              {{ .Annotations.summary }}
              {{ if .Annotations.runbook }}runbook: {{ .Annotations.runbook }}{{ end }}
              {{ end }}
      - name: "slack-page"
        slack_configs:
          - api_url: "<SLACK_WEBHOOK_URL>"
            channel: "#alerts-page"
            send_resolved: true
            title: '🚨 PAGE: {{ .CommonAnnotations.summary }}'
            text: >-
              {{ range .Alerts }}*{{ .Labels.alertname }}*
              {{ .Annotations.summary }}
              {{ if .Annotations.runbook }}runbook: {{ .Annotations.runbook }}{{ end }}
              {{ end }}
