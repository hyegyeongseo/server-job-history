# blanket namespace를 안 둠(postgres만 db, 나머지는 app). 각 파일 metadata.namespace로 고정.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - postgres.yaml            # CNPG로 가면 이 줄 제거
  - migrate-job.yaml
  - servicemonitor.yaml      # kps(ServiceMonitor CRD) 설치 후 적용해야 함
  - hpa.yaml                 # metrics-server 동작 확인 후 활성화
