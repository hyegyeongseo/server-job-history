# 앱 Deployment + ServiceAccount
# 코드와 매칭: 포트 8000 · liveness(DB 안 봄)/readiness(DB 확인) · uid 1000 · /tmp/prom_metrics emptyDir
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-job-manager
  namespace: app
  labels: { app.kubernetes.io/name: server-job-manager }
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app.kubernetes.io/name: server-job-manager } }
  template:
    metadata: { labels: { app.kubernetes.io/name: server-job-manager } }
    spec:
      serviceAccountName: server-job-manager
      terminationGracePeriodSeconds: 30
      # 사설 레지스트리(regcred):
      imagePullSecrets: [{ name: regcred }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: REPLACED_BY_OVERLAY            # overlay images: 가 <REGISTRY>/server-job-manager:0.1.0 으로 치환
          ports: [{ name: http, containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: server-job-manager-config }
            - secretRef:    { name: server-job-manager-secret }   # ← kubectl로 따로 생성 (git 미커밋)
          startupProbe:   { httpGet: { path: /health/liveness/,  port: http }, periodSeconds: 2,  failureThreshold: 30 }
          livenessProbe:  { httpGet: { path: /health/liveness/,  port: http }, periodSeconds: 15, timeoutSeconds: 3 }
          readinessProbe: { httpGet: { path: /health/readiness/, port: http }, periodSeconds: 10, timeoutSeconds: 3 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }   # ★ HPA가 이 requests.cpu 기준
            limits:   { cpu: 500m, memory: 768Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts: [{ name: prom-metrics, mountPath: /tmp/prom_metrics }]
      volumes: [{ name: prom-metrics, emptyDir: {} }]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: server-job-manager
  namespace: app
