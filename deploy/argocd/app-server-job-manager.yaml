apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: server-job-manager, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://github.com/hyegyeongseo/server-job-history.git
    targetRevision: main
    path: deploy/manifests/server-job-manager/overlays/local
  destination: { server: https://kubernetes.default.svc, namespace: app }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]